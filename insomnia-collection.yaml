    meta:
      id: fld_155f354dd8e642a4a6a000cedf8f46e4
      created: 1772818888727
      modified: 1772895881951
      sortKey: 100
      description: Authentication endpoints via API Gateway BFF proxy
    children:
      - url: "{{ _.gateway_url }}/auth/token"
        name: login (get tokens)
        meta:
          id: req_bcacf843026943328e61e73c2ba0f468
          created: 1772818888729
          modified: 1772895893824
          isPrivate: false
          description: >-
            Login via BFF. Returns accessToken in body, sets refreshToken as
            HttpOnly cookie.


            After success, copy access_token from response to environment
            variable.
          sortKey: 100
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "email": "{{ _.test_email }}",
              "password": "{{ _.test_password }}"
            }
        headers:
          - name: Content-Type
            value: application/json
        scripts:
          afterResponse: |
            const jsonBody = insomnia.response.json();
            const token = jsonBody?.data?.access_token;

            if (token) {
              await insomnia.environment.set("access_token", token);
              console.log("access_token saved");
            } else {
              console.warn("access_token not found in response");
            }
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
      - url: "{{ _.gateway_url }}/auth/logout"
        name: logout
        meta:
          id: req_040828054a7646ccbeeeaa287a6e9ace
          created: 1772818888730
          modified: 1772895852446
          isPrivate: false
          description: Logout — invalidates refresh token in Keycloak, clears cookie.
            Returns 204.
          sortKey: 300
        method: POST
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
      - url: "{{ _.gateway_url }}/auth/refresh-token"
        name: refresh token
        meta:
          id: req_7b6dcef62ce04e55ad8767d3c0decd66
          created: 1772818888730
          modified: 1772895902956
          isPrivate: false
          description: |-
            Refresh tokens using HttpOnly cookie (KEYCLOAK_REFRESH_TOKEN).
            Cookies are sent automatically from Insomnia's cookie jar.
          sortKey: 200
        method: POST
        scripts:
          afterResponse: |
            const jsonBody = insomnia.response.json();
            const token = jsonBody?.data?.access_token;

            if (token) {
              await insomnia.environment.set("access_token", token);
              console.log("access_token saved");
            } else {
              console.warn("access_token not found in response");
            }
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
