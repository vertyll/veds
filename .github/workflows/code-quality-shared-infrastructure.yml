name: Code Quality - Shared Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'shared-infrastructure/**'
      - '.github/workflows/code-quality-shared-infrastructure.yml'
      - '.github/workflows/code-quality.yml'
  pull_request:
    branches: [main]
    paths:
      - 'shared-infrastructure/**'
  workflow_dispatch:

jobs:
  quality:
    uses: ./.github/workflows/code-quality.yml
    with:
      service: shared-infrastructure
