name: Build and Deploy Mail Service

on:
  push:
    branches: [main]
    paths:
      - 'mail-service/**'
      - 'shared-infrastructure/**'
      - 'iam-contracts/**'
      - 'mail-contracts/**'
      - 'contracts/mail-service/**'
      - 'contracts/iam-service/mail-requested/**'
      - '.github/workflows/mail-service.yml'
      - '.github/workflows/quality.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mail-service/**'
      - 'shared-infrastructure/**'
      - 'iam-contracts/**'
      - 'mail-contracts/**'
      - 'contracts/mail-service/**'
      - 'contracts/iam-service/mail-requested/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  quality:
    uses: ./.github/workflows/code-quality.yml
    with:
      service: mail-service

  build-and-push:
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: |
          IMAGE_NAME="${GITHUB_REPOSITORY}-mail-service"
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./mail-service/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    steps:
      - name: Set lowercase image name
        run: |
          IMAGE_NAME="${GITHUB_REPOSITORY}-mail-service"
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        env:
          CONTAINER_REGISTRY: ${{ env.REGISTRY }}
          IMAGE: ${{ env.IMAGE_NAME }}
          GH_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          envs: CONTAINER_REGISTRY,IMAGE,GH_ACTOR,GH_TOKEN
          script: |
            cd ~/podman/compose
            
            echo "Logging into GitHub Container Registry..."
            echo "$GH_TOKEN" | podman login "$CONTAINER_REGISTRY" -u "$GH_ACTOR" --password-stdin > /dev/null 2>&1
            
            echo "Pulling latest image..."
            podman pull "$CONTAINER_REGISTRY/$IMAGE:latest" > /dev/null 2>&1
            
            echo "Recreating container..."
            podman-compose -f veds.yml up -d --force-recreate --no-deps veds-mail-service > /dev/null 2>&1
            
            echo "Waiting for container to start..."
            sleep 15
            
            echo "=== Container status ==="
            podman ps | grep veds-mail-service || echo "Container is not running!"
            
            echo "=== Last logs ==="
            podman logs --tail 50 veds-mail-service
            
            sleep 5
            
            echo "=== Health check ==="
            podman exec veds-mail-service curl -f http://localhost:8080/actuator/health && \
              echo "✓ Mail Service is running!" || \
              echo "✗ Mail Service health check failed"