name: Build and Push Provisioner

on:
  push:
    branches: [main]
    paths:
      - 'infra/kafka/**'
      - 'infra/provisioner/**'
      - 'contracts/**'
      - 'scripts/schema_registry/**'
      - '.github/workflows/provisioner.yml'
  pull_request:
    branches: [main]
    paths:
      - 'infra/kafka/**'
      - 'infra/provisioner/**'
      - 'contracts/**'
      - 'scripts/schema_registry/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image name
        run: |
          IMAGE_NAME="${GITHUB_REPOSITORY}-provisioner"
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push provisioner image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/provisioner/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    steps:
      - name: Set lowercase image name
        run: |
          IMAGE_NAME="${GITHUB_REPOSITORY}-provisioner"
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}

      - name: Run provisioner one-shot on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          CONTAINER_REGISTRY: ${{ env.REGISTRY }}
          IMAGE: ${{ env.IMAGE_NAME }}
          GH_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          envs: CONTAINER_REGISTRY,IMAGE,GH_ACTOR,GH_TOKEN
          script: |
            set -euo pipefail
            cd ~/podman/compose

            echo "Logging into GitHub Container Registry..."
            echo "$GH_TOKEN" | podman login "$CONTAINER_REGISTRY" -u "$GH_ACTOR" --password-stdin > /dev/null 2>&1

            echo "Pulling latest provisioner image..."
            podman pull "$CONTAINER_REGISTRY/$IMAGE:latest" > /dev/null 2>&1

            echo "Ensuring Terraform state dir exists..."
            mkdir -p ./data/veds-provisioner-state

            echo "=== Running provisioner (topics + schemas) ==="
            # --rm cleans up the container, --force-recreate ensures latest image is used.
            podman-compose -f veds.yml run --rm veds-provisioner

            echo "✓ Provisioning finished"