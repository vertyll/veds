name: Register Avro Schemas

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main
    paths:
      - "contracts/**"
      - "scripts/schema_registry/**"
      - ".github/workflows/schema-registry.yml"

jobs:
  register-schemas:
    runs-on: ubuntu-latest
    env:
      SCHEMA_REGISTRY_URL: ${{ secrets.SCHEMA_REGISTRY_URL }}
      SCHEMA_COMPATIBILITY: ${{ vars.SCHEMA_COMPATIBILITY || 'BACKWARD' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Register schemas
        run: |
          python scripts/schema_registry/register_schemas.py \
            --registry-url "$SCHEMA_REGISTRY_URL" \
            --compatibility "$SCHEMA_COMPATIBILITY"
