name: Publish KDoc (shared-infrastructure)

on:
  push:
    branches: [main]
    paths:
      - 'shared-infrastructure/**'
      - '.github/workflows/dokka.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25 (Zulu)
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "25"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-dokka-${{ hashFiles('shared-infrastructure/**/*.gradle.kts', 'shared-infrastructure/**/libs.versions.toml') }}
          restore-keys: |
            gradle-dokka-

      - name: Make gradlew executable
        working-directory: shared-infrastructure
        run: chmod +x ./gradlew

      - name: Generate Dokka HTML
        working-directory: shared-infrastructure
        run: ./gradlew --no-daemon dokkaGenerate

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Dokka artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dokka

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4