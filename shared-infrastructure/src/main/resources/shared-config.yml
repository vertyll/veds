spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.vertyll.veds.*"
        spring.json.value.default.type: "com.vertyll.veds.sharedinfrastructure.event.DomainEvent"
        spring.json.use.type.headers: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true
        spring.json.value.default.type: "com.vertyll.veds.sharedinfrastructure.event.DomainEvent"

veds:
  shared:
    security:
      jwt:
        secret-key: ${JWT_SECRET_KEY:CbIKeXKAkneVUn5me1nHZ+V74qpmZ36InUDFEXsg6YY=}
        access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:900000}  # 15 minutes in milliseconds
        refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}  # 7 days in milliseconds
        refresh-token-cookie-name: refresh_token
        auth-header-name: Authorization
        cookie:
          httpOnly: true
          secure: ${JWT_COOKIE_SECURE:false}
          sameSite: Strict
          path: "/"
    services:
      topics:
        # Topics that services publish to or subscribe from
        all:
          user-registered: "user-registered"
          user-activated: "user-activated"
          user-password-reset: "user-password-reset"
          mail-requested: "mail-requested"
          mail-sent: "mail-sent"
          mail-failed: "mail-failed"
          saga-compensation: "saga-compensation"

